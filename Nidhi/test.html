<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cute Elephant with Outlined Trunk</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(#dff6ff, #ffffff);
  }

  .scene {
    width: 320px;
    height: 320px;
    position: relative;
  }

  .elephant {
    position: absolute;
    width: 100%;
    height: 100%;
  }

  .body {
    position: absolute;
    width: 190px;
    height: 150px;
    background: #a8d8ff;
    border-radius: 50%;
    bottom: 40px;
    left: 65px;
  }

  .head {
    position: absolute;
    width: 130px;
    height: 120px;
    background: #a8d8ff;
    border-radius: 50%;
    top: 35px;
    left: 95px;
  }

  .ear {
    position: absolute;
    width: 100px;
    height: 100px;
    background: #cfeaff;
    border-radius: 50%;
    top: 45px;
  }

  .ear.left { left: 40px; }
  .ear.right { right: 40px; }

  .eye {
    position: absolute;
    width: 22px;
    height: 22px;
    background: #222;
    border-radius: 50%;
    top: 80px;
  }

  .eye.left { left: 130px; }
  .eye.right { left: 165px; }

  .eye::after {
    content: "";
    position: absolute;
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;
    top: 3px;
    left: 3px;
  }

  .cheek {
    position: absolute;
    width: 22px;
    height: 14px;
    background: #ffb6c1;
    border-radius: 50%;
    top: 110px;
    opacity: 0.7;
  }

  .cheek.left { left: 115px; }
  .cheek.right { left: 185px; }

  /* UPDATED TRUNK */
  .trunk {
    position: absolute;
    width: 22px;
    height: 110px;
    background: #a8d8ff;
    border-radius: 20px;
    border: 3px solid #6eaed6; /* outline */
    top: 100px;
    left: 150px;
    transform-origin: top center;
    animation: trunkMove 2.5s ease-in-out infinite;
  }

  /* trunk wrinkles (cute detail) */
  .trunk::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 12px,
      rgba(0,0,0,0.08) 12px,
      rgba(0,0,0,0.08) 14px
    );
    border-radius: 20px;
  }

  @keyframes trunkMove {
    0%   { transform: rotate(0deg); }
    25%  { transform: rotate(40deg); }
    50%  { transform: rotate(0deg); }
    75%  { transform: rotate(-40deg); }
    100% { transform: rotate(0deg); }
  }

  .foot {
    position: absolute;
    width: 45px;
    height: 35px;
    background: #a8d8ff;
    border-radius: 50%;
    bottom: 15px;
  }

  .foot.left { left: 85px; }
  .foot.right { right: 85px; }

</style>
</head>
<body>

<div class="scene">
  <div class="elephant">
    <div class="ear left"></div>
    <div class="ear right"></div>
    <div class="body"></div>
    <div class="head"></div>

    <div class="eye left"></div>
    <div class="eye right"></div>

    <div class="cheek left"></div>
    <div class="cheek right"></div>

    <div class="trunk"></div>

    <div class="foot left"></div>
    <div class="foot right"></div>
  </div>
</div>

</body>
</html>
